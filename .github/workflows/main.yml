name: Build Foodzy APK and Signed AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Project & Build APK/AAB
      run: |
        cordova create foodzy_project com.foodzy.app "Foodzy"
        cd foodzy_project
        
        rm -rf www/*
        rm -f config.xml
        
        cp ../index.html www/
        cp ../config.xml .
        
        cordova platform add android@13.0.0 --no-telemetry
        
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
        
        # 1. Debug APK Build
        cordova build android --debug --no-telemetry -- --gradleArg=-Dorg.gradle.daemon=false
        
        # 2. Release AAB Build
        cordova build android --release --no-telemetry -- --packageType=bundle --gradleArg=-Dorg.gradle.daemon=false

    - name: Generate Keystore & Export PEM Certificate
      run: |
        cd foodzy_project/platforms/android/app/build/outputs/bundle/release/
        
        # Fixed params ke sath Keystore generate karein
        keytool -genkey -v -keystore foodzy_upload.keystore -alias foodzy_upload -keyalg RSA -keysize 2048 -validity 10000 -storepass foodzyKey123 -keypass foodzyKey123 -dname "CN=Foodzy, OU=App, O=Foodzy, L=Kailashahar, ST=Tripura, C=IN"
        
        # Google Play Reset request ke liye PEM Certificate Export karein
        keytool -export -rfc -keystore foodzy_upload.keystore -alias foodzy_upload -file upload_certificate.pem -storepass foodzyKey123
        
        # AAB ko Sign karein
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore foodzy_upload.keystore -storepass foodzyKey123 -keypass foodzyKey123 app-release.aab foodzy_upload

    - name: Upload Signed AAB & PEM Certificate to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Foodzy-Signed-Builds
        path: |
          foodzy_project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          foodzy_project/platforms/android/app/build/outputs/bundle/release/app-release.aab
          foodzy_project/platforms/android/app/build/outputs/bundle/release/upload_certificate.pem
